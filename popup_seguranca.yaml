# Popup Configuration for Camera Layout

# This configuration sets the maximum width for the popup to allow viewing of all camera columns without horizontal scroll.

--popup-max-width: 100vw;

.grid-layout {
  display: grid;
  grid-template-columns: repeat(3, 1fr);  # Adjusting the grid layout to display 3 columns properly
  gap: 10px;  # Add gap between items if needed
}